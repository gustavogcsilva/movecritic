<section class="resultados">
    <div class="grid-resultados" style="display: flex; flex-wrap: wrap; gap: 20px; justify-content: center; padding: 20px;">
        
        {% for obra in lista_resultados %}
        <div class="card" style="background: #222; border-radius: 10px; width: 250px; color: white; padding: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.5); transition: 0.3s;">
            <img src="{{ obra.img }}" alt="Capa" style="width: 100%; border-radius: 5px; height: 350px; object-fit: cover;">
            
            <div class="card-info">
                <h3 style="margin: 10px 0; font-size: 1.2em;">{{ obra.titulo }}</h3>
                <p style="color: #ffcc00; font-weight: bold;">⭐ {{ obra.nota }}</p>

                <details style="margin: 10px 0; font-size: 0.9em; cursor: pointer; background: #333; padding: 5px; border-radius: 5px;">
                    <summary style="color: #ffcc00; font-weight: bold;">📖 Ver Sinopse</summary>
                    <p style="padding-top: 10px; color: #eee; line-height: 1.4;">{{ obra.sinopse }}</p>
                </details>

                <div class="critica-usuario" style="margin-top: 15px; border-top: 1px solid #444; padding-top: 10px;">
                    <label style="font-size: 0.8em; color: #aaa;">Sua opinião:</label>
                    <textarea placeholder="O que achou?" style="width: 100%; height: 60px; border-radius: 5px; background: #111; color: white; border: 1px solid #444; padding: 5px; margin-top: 5px; resize: none;"></textarea>
                    <button style="background: #ffcc00; color: black; border: none; padding: 8px; border-radius: 5px; cursor: pointer; margin-top: 5px; width: 100%; font-weight: bold;">
                        Salvar Crítica
                    </button>
                </div>
            </div>
        </div>
        {% else %}
            {% if busca %}
                <p style="color: white; text-align: center; width: 100%;">Nenhum resultado encontrado para "{{ busca }}".</p>
            {% endif %}
        {% endfor %}

    </div>
</section>
